<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christina Cory - Portfolio</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Inline Icon Components (Replacing lucide-react for standalone usage) ---
    const IconBase = ({ size = 24, className = '', fill = 'none', children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Menu = (props) => <IconBase {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
    const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
    const ChevronRight = (props) => <IconBase {...props}><path d="m9 18 6-6-6-6"/></IconBase>;
    const ChevronLeft = (props) => <IconBase {...props}><path d="m15 18-6-6 6-6"/></IconBase>;
    const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const Layout = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></IconBase>;
    const Camera = (props) => <IconBase {...props}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>;
    const Monitor = (props) => <IconBase {...props}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></IconBase>;
    const Smartphone = (props) => <IconBase {...props}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></IconBase>;
    const MapPin = (props) => <IconBase {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
    const Mail = (props) => <IconBase {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconBase>;
    const Phone = (props) => <IconBase {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>;

    // --- Reusable Components ---
    const Card = ({ children, className = '' }) => (
      <div className={`bg-white rounded-[2rem] p-8 md:p-12 shadow-[0_2px_20px_rgba(0,0,0,0.04)] ${className}`}>
        {children}
      </div>
    );

    const SectionHeader = ({ subtitle, title }) => (
      <div className="mb-10">
        <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">{subtitle}</span>
        <h2 className="text-3xl md:text-4xl font-extrabold text-gray-900 mt-2 tracking-tight">{title}</h2>
      </div>
    );

    // --- Main Application ---
    function Portfolio() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      // Navigation Links
      const navLinks = [
        { name: 'Home', active: true },
        { name: 'About' },
        { name: 'Services' },
        { name: 'Portfolio' },
        { name: 'Resume' },
        { name: 'Blog' },
        { name: 'Contact' }
      ];

      return (
        <div className="min-h-screen bg-[#f4f7f9] font-sans text-gray-600">
          
          {/* Top Header - Mobile & Desktop */}
          <header className="fixed top-0 w-full bg-white/80 backdrop-blur-md z-40 border-b border-gray-100 lg:hidden">
            <div className="flex justify-between items-center px-6 py-4">
              <h1 className="text-xl font-bold text-gray-900 tracking-tight">Christina Cory</h1>
              <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-gray-900">
                {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
              </button>
            </div>
          </header>

          {/* Main Layout Container */}
          <div className="max-w-[1200px] mx-auto flex gap-8 pt-24 lg:pt-20 px-4 md:px-8 pb-20 relative">

            {/* --- Sidebar Navigation (Desktop) --- */}
            <aside className="hidden lg:block w-[240px] shrink-0">
              <div className="sticky top-20 bg-[#111111] rounded-[2rem] p-10 py-12 flex flex-col shadow-xl">
                <h2 className="text-white text-2xl font-bold mb-10 tracking-tight">Christina<br/>Cory</h2>
                <nav className="flex flex-col gap-5">
                  {navLinks.map((link) => (
                    <a 
                      key={link.name} 
                      href={`#${link.name.toLowerCase()}`}
                      className={`text-sm font-medium transition-colors ${
                        link.active ? 'text-white' : 'text-gray-400 hover:text-white'
                      }`}
                    >
                      {link.name}
                    </a>
                  ))}
                </nav>
                <div className="mt-auto pt-10 text-xs text-gray-500">
                  © {new Date().getFullYear()} Christina.
                </div>
              </div>
            </aside>

            {/* --- Mobile Menu Overlay --- */}
            {isMobileMenuOpen && (
              <div className="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center lg:hidden">
                <button 
                  onClick={() => setIsMobileMenuOpen(false)} 
                  className="absolute top-6 right-6 text-white"
                >
                  <X size={32} />
                </button>
                <nav className="flex flex-col gap-6 text-center">
                  {navLinks.map((link) => (
                    <a 
                      key={link.name} 
                      href={`#${link.name.toLowerCase()}`}
                      onClick={() => setIsMobileMenuOpen(false)}
                      className={`text-2xl font-medium transition-colors ${
                        link.active ? 'text-white' : 'text-gray-400'
                      }`}
                    >
                      {link.name}
                    </a>
                  ))}
                </nav>
              </div>
            )}

            {/* --- Main Content Area --- */}
            <main className="w-full max-w-[800px] mx-auto flex flex-col gap-8">

              {/* 1. Hero / Intro Section */}
              <Card id="home" className="flex flex-col">
                <div className="flex flex-col sm:flex-row gap-8 items-start sm:items-center mb-10">
                  <div className="relative w-32 h-32 md:w-40 md:h-40 shrink-0">
                    <img 
                      src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=400&h=400" 
                      alt="Christina Cory" 
                      className="w-full h-full object-cover rounded-full shadow-lg"
                    />
                    <div className="absolute -bottom-2 -right-2 bg-black text-white text-[10px] font-bold py-1 px-3 rounded-full border-2 border-white">
                      HI THERE!
                    </div>
                  </div>
                  <div>
                    <span className="text-gray-500 font-medium mb-1 block">UI & UX Designer, Photographer</span>
                    <h1 className="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight leading-tight mb-4">
                      Christina Cory
                    </h1>
                    <p className="text-gray-500 leading-relaxed max-w-md">
                      I design and develop services for customers of all sizes, specializing in creating stylish, modern websites, web services and online stores.
                    </p>
                  </div>
                </div>

                {/* Stats */}
                <div className="grid grid-cols-3 gap-4 pt-8 border-t border-gray-100">
                  <div>
                    <div className="text-2xl md:text-3xl font-bold text-gray-900">12<span className="text-sm font-medium text-gray-500 ml-1">Years</span></div>
                    <div className="text-xs text-gray-400 uppercase tracking-wider mt-1">Experience</div>
                  </div>
                  <div>
                    <div className="text-2xl md:text-3xl font-bold text-gray-900">2K<span className="text-sm font-medium text-gray-500 ml-1">Clients</span></div>
                    <div className="text-xs text-gray-400 uppercase tracking-wider mt-1">Happy Clients</div>
                  </div>
                  <div>
                    <div className="text-2xl md:text-3xl font-bold text-gray-900">100<span className="text-sm font-medium text-gray-500 ml-1">%</span></div>
                    <div className="text-xs text-gray-400 uppercase tracking-wider mt-1">Satisfaction</div>
                  </div>
                </div>
              </Card>

              {/* 2. Portfolio Section */}
              <Card id="portfolio">
                <SectionHeader subtitle="Portfolio" title="My Latest Works" />
                
                {/* Filter Tabs */}
                <div className="flex gap-4 mb-8">
                  <span className="px-5 py-2 bg-black text-white text-sm font-semibold rounded-full cursor-pointer">All</span>
                  <span className="px-5 py-2 text-gray-500 hover:text-black text-sm font-semibold cursor-pointer transition-colors">Branding</span>
                  <span className="px-5 py-2 text-gray-500 hover:text-black text-sm font-semibold cursor-pointer transition-colors">Photography</span>
                </div>

                {/* Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  {[
                    { img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=600', badge: 'Mockup', title: 'Pink Glasses' },
                    { img: 'https://images.unsplash.com/photo-1508610048659-a06b669e3321?auto=format&fit=crop&q=80&w=600', badge: 'Product', title: 'White Flower' },
                    { img: 'https://images.unsplash.com/photo-1490750967868-88cb4ec0f8bf?auto=format&fit=crop&q=80&w=600', badge: 'Brand', title: 'Orange Bloom' },
                    { img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=600', badge: 'Design', title: 'House Model' },
                  ].map((item, i) => (
                    <div key={i} className="group relative rounded-2xl overflow-hidden cursor-pointer">
                      <img src={item.img} alt={item.title} className="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-105" />
                      <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-semibold text-gray-900">
                        {item.badge}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* 3. Services Section */}
              <Card id="services">
                <SectionHeader subtitle="Services" title="What I Do" />
                <div className="flex flex-col gap-10">
                  {[
                    { num: '01', title: 'UI/UX Design', desc: 'Create beautiful and functional user interfaces for web and mobile apps.', icon: <Layout className="w-8 h-8 text-black" /> },
                    { num: '02', title: 'Photography', desc: 'Professional photography services including product, portrait, and event.', icon: <Camera className="w-8 h-8 text-black" /> },
                    { num: '03', title: 'Web Development', desc: 'Front-end development using modern frameworks like React and Vue.', icon: <Monitor className="w-8 h-8 text-black" /> },
                    { num: '04', title: 'App Development', desc: 'Cross-platform mobile application development for iOS and Android.', icon: <Smartphone className="w-8 h-8 text-black" /> },
                  ].map((service, i) => (
                    <div key={i} className="flex items-start gap-6 group cursor-pointer">
                      <div className="relative shrink-0 w-16 h-16 flex items-center justify-center bg-gray-50 rounded-2xl group-hover:bg-black transition-colors duration-300">
                        {/* Outline Number underneath */}
                        <span className="absolute -left-4 -top-2 text-4xl font-extrabold text-gray-100 opacity-50 z-0 select-none">
                          {service.num}
                        </span>
                        <div className="z-10 text-gray-900 group-hover:text-white transition-colors duration-300">
                          {React.cloneElement(service.icon, { className: 'w-7 h-7' })}
                        </div>
                      </div>
                      <div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">{service.title}</h3>
                        <p className="text-gray-500 text-sm leading-relaxed">{service.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* 4. Testimonials Section */}
              <Card id="testimonials">
                <div className="flex justify-between items-end mb-10">
                  <SectionHeader subtitle="Testimonials" title="Client Reviews" />
                  <div className="flex gap-2 mb-2">
                    <button className="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:text-black hover:border-black transition-colors">
                       <ChevronLeft size={20} />
                    </button>
                    <button className="w-10 h-10 rounded-full border border-black flex items-center justify-center bg-black text-white">
                       <ChevronRight size={20} />
                    </button>
                  </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  {[
                    { name: 'James Smith', role: 'CEO, TechCorp', text: 'Christina is an amazing designer. She understood our needs perfectly and delivered a stunning product that exceeded expectations.', img: 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&q=80&w=100' },
                    { name: 'Sarah Lee', role: 'Marketing Director', text: 'Working with Christina was a pleasure. Her attention to detail and creative vision brought our brand to life.', img: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&q=80&w=100' }
                  ].map((review, i) => (
                    <div key={i} className="bg-gray-50 rounded-2xl p-8 relative">
                      <div className="flex gap-1 mb-4 text-yellow-400">
                        <Star size={16} fill="currentColor" />
                        <Star size={16} fill="currentColor" />
                        <Star size={16} fill="currentColor" />
                        <Star size={16} fill="currentColor" />
                        <Star size={16} fill="currentColor" />
                      </div>
                      <p className="text-gray-700 font-medium leading-relaxed mb-6">"{review.text}"</p>
                      <div className="flex items-center gap-4">
                        <img src={review.img} alt={review.name} className="w-12 h-12 rounded-full object-cover" />
                        <div>
                          <h4 className="text-gray-900 font-bold">{review.name}</h4>
                          <span className="text-sm text-gray-500">{review.role}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* 5. Resume Section */}
              <Card id="resume">
                <SectionHeader subtitle="Resume" title="Education & Experience" />
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 mt-8">
                  {/* Education Column */}
                  <div>
                    <h3 className="text-xl font-bold text-gray-900 mb-8 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-black"></span> Education
                    </h3>
                    <div className="pl-4 border-l-2 border-gray-100 flex flex-col gap-8">
                      {[
                        { year: '2016 - 2018', title: 'Master in Design', org: 'Stanford University' },
                        { year: '2012 - 2016', title: 'Bachelor in Arts', org: 'University of California' },
                        { year: '2010 - 2012', title: 'Web Development Course', org: 'Code Academy' }
                      ].map((item, i) => (
                        <div key={i} className="relative">
                          <div className="absolute -left-[21px] top-1.5 w-3 h-3 bg-white border-2 border-black rounded-full"></div>
                          <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">{item.year}</span>
                          <h4 className="text-lg font-bold text-gray-900 mt-1">{item.title}</h4>
                          <span className="text-sm text-gray-500 mt-1 block">{item.org}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Experience Column */}
                  <div>
                    <h3 className="text-xl font-bold text-gray-900 mb-8 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-black"></span> Experience
                    </h3>
                    <div className="pl-4 border-l-2 border-gray-100 flex flex-col gap-8">
                      {[
                        { year: '2020 - Present', title: 'Senior UI/UX Designer', org: 'Google Inc.' },
                        { year: '2018 - 2020', title: 'Lead Product Designer', org: 'Spotify' },
                        { year: '2016 - 2018', title: 'Junior UI Designer', org: 'Creative Agency' }
                      ].map((item, i) => (
                        <div key={i} className="relative">
                          <div className="absolute -left-[21px] top-1.5 w-3 h-3 bg-white border-2 border-black rounded-full"></div>
                          <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">{item.year}</span>
                          <h4 className="text-lg font-bold text-gray-900 mt-1">{item.title}</h4>
                          <span className="text-sm text-gray-500 mt-1 block">{item.org}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </Card>

              {/* 6. Skills/Logos Strip */}
              <Card className="py-8">
                 <div className="flex flex-wrap justify-between items-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
                   {/* Simulating Logos with Text since we don't have SVGs */}
                   <div className="text-xl font-black tracking-tighter flex items-center gap-1"><span className="text-blue-500">❖</span> Figma</div>
                   <div className="text-xl font-bold tracking-tight flex items-center gap-1"><span className="text-yellow-500">♦</span> Sketch</div>
                   <div className="text-xl font-extrabold flex items-center gap-1"><span className="text-blue-600">W</span> Webflow</div>
                   <div className="text-xl font-bold flex items-center gap-1"><span className="text-red-500">Id</span> InDesign</div>
                   <div className="text-xl font-bold flex items-center gap-1"><span className="text-blue-400">Ps</span> Photoshop</div>
                 </div>
              </Card>

              {/* 7. Blog Section */}
              <Card id="blog">
                <SectionHeader subtitle="Blog" title="Latest Blog Posts" />
                
                <div className="flex flex-col gap-6">
                  {[
                    { date: '12 Oct 2023', title: '10 years of working from home', img: 'https://images.unsplash.com/photo-1593642532744-d377ab507dc8?auto=format&fit=crop&q=80&w=300' },
                    { date: '05 Sep 2023', title: 'Importance of outdoor times', img: 'https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&q=80&w=300' },
                    { date: '22 Aug 2023', title: 'Fun drinks to make at home', img: 'https://images.unsplash.com/photo-1544145945-f90425340c7e?auto=format&fit=crop&q=80&w=300' },
                    { date: '10 Jul 2023', title: 'Secrets to eating healthy', img: 'https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&q=80&w=300' },
                  ].map((post, i) => (
                    <div key={i} className="flex flex-col sm:flex-row items-start sm:items-center gap-6 group cursor-pointer p-2 rounded-2xl hover:bg-gray-50 transition-colors">
                      <div className="w-full sm:w-48 h-32 shrink-0 rounded-xl overflow-hidden relative">
                        <img src={post.img} alt={post.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                        {i === 0 && <span className="absolute top-2 left-2 bg-black/70 text-white text-[10px] px-2 py-1 rounded font-bold">VIDEO</span>}
                      </div>
                      <div className="flex-1">
                        <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">{post.date}</span>
                        <h3 className="text-xl font-bold text-gray-900 mt-2 mb-4 group-hover:text-blue-600 transition-colors line-clamp-2">
                          {post.title}
                        </h3>
                        <button className="flex items-center gap-2 text-sm font-bold text-black border border-gray-200 px-4 py-2 rounded-full hover:bg-black hover:text-white transition-colors">
                          Read More <ChevronRight size={16} />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* 8. Contact Section */}
              <Card id="contact">
                <SectionHeader subtitle="Contact" title="Get In Touch" />
                
                <p className="text-gray-500 mb-8 max-w-lg">
                  Feel free to get in touch with me. I am always open to discussing new projects, creative ideas or opportunities to be part of your visions.
                </p>

                <div className="flex flex-col md:flex-row gap-8 mb-10">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-black shrink-0">
                      <Mail size={20} />
                    </div>
                    <div>
                      <span className="block text-xs text-gray-400 uppercase font-bold tracking-widest mb-1">Email Me</span>
                      <a href="mailto:hello@christina.com" className="font-bold text-gray-900">hello@christina.com</a>
                    </div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-black shrink-0">
                      <Phone size={20} />
                    </div>
                    <div>
                      <span className="block text-xs text-gray-400 uppercase font-bold tracking-widest mb-1">Call Me</span>
                      <a href="tel:+1234567890" className="font-bold text-gray-900">+1 234 567 890</a>
                    </div>
                  </div>
                </div>

                <form className="space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input 
                      type="text" 
                      placeholder="Name" 
                      className="w-full pb-3 border-b border-gray-200 focus:border-black outline-none bg-transparent placeholder:text-gray-400 font-medium transition-colors"
                    />
                    <input 
                      type="email" 
                      placeholder="Email" 
                      className="w-full pb-3 border-b border-gray-200 focus:border-black outline-none bg-transparent placeholder:text-gray-400 font-medium transition-colors"
                    />
                  </div>
                  <input 
                    type="text" 
                    placeholder="Subject" 
                    className="w-full pb-3 border-b border-gray-200 focus:border-black outline-none bg-transparent placeholder:text-gray-400 font-medium transition-colors"
                  />
                  <textarea 
                    placeholder="Message" 
                    rows="4"
                    className="w-full pb-3 border-b border-gray-200 focus:border-black outline-none bg-transparent placeholder:text-gray-400 font-medium transition-colors resize-none mt-4"
                  ></textarea>
                  <button type="button" className="bg-black text-white px-8 py-4 rounded-full font-bold hover:bg-gray-800 transition-colors mt-6">
                    Send Message
                  </button>
                </form>
              </Card>

              {/* 9. Map (Footer Area) */}
              <div className="rounded-[2rem] overflow-hidden h-[400px] shadow-sm relative">
                 <img 
                   src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1200" 
                   alt="Map Location" 
                   className="w-full h-full object-cover grayscale opacity-80"
                 />
                 {/* Fake Map Marker/Tooltip to match screenshot */}
