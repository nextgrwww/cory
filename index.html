<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christina Cory - Portfolio</title>
  
  <!-- Bootstrap CSS for precise layout match -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* --- Original Theme Styles for 1:1 Match --- */
    body,html { height:100%; width:100%; }
    body { background:#f2f5f8; min-height:100%; overflow-x:hidden; position:relative; z-index:1; color:#838485; font-family:Open Sans,sans-serif; font-size:1rem; font-weight:400; letter-spacing:0; }
    h1,h2,h3,h4,h5,h6 { color:#000; font-family:Poppins,sans-serif; font-weight:600; letter-spacing:-.3px; }
    p { line-height:1.74; margin:0; }
    a { color:#000000b3; transition:.1s linear; text-decoration:none; }
    a:hover { color:#000; }
    ul { margin:0; padding:0; list-style:none; }

    /* Typography Utilities */
    .mono-heading { color:#000; font-family:Roboto Mono,monospace; font-size:.9em; font-weight:500; letter-spacing:.5px; text-transform:uppercase; }
    .font-small { font-size:.9em; line-height:1.7; }
    .stroke-text { color:#000; -webkit-text-fill-color:transparent; -webkit-text-stroke-width:1.4px; -webkit-text-stroke-color:#000; }
    .font-family-mono { font-family:Roboto Mono,monospace; }
    .fw-semi-bold { font-weight:600; }
    .line-height-100 { line-height:1; }
    .line-height-140 { line-height: 1.4; }
    .text-yellow { color:#ffb657; }

    /* Layout Containers */
    .sections-wrapper { padding-bottom:3em; }
    .section-box { background:#fff; border-radius:.5em; box-shadow:0 8px 26px #16181a12; padding:3em; transition:.16s ease-out; }
    .section-box:hover { box-shadow:0 8px 32px #16181a1c; }
    @media (max-width:991.98px) { .section-box { padding:2.5em 2em; } }
    @media (max-width:767.98px) { .section-box { padding:2em 1.5em; } }

    /* Background Lines */
    .bg-lines { height:100%; left:0; position:fixed; top:0; width:100%; z-index:-1; }
    .bg-lines .bg-line-1, .bg-lines .bg-line-2, .bg-lines .bg-line-3, .bg-lines .bg-line-4 { border-right:1px solid #dcdfe2; height:100%; left:0; position:absolute; top:0; }
    .bg-lines .bg-line-1:before, .bg-lines .bg-line-2:before, .bg-lines .bg-line-3:before, .bg-lines .bg-line-4:before { animation:bgLine 8s linear infinite; background:linear-gradient(transparent,#00000080); content:""; height:80px; position:absolute; right:-1px; top:-80px; width:1px; }
    .bg-lines .bg-line-1 { width:20%; }
    .bg-lines .bg-line-2 { width:40%; }
    .bg-lines .bg-line-2:before { animation-delay:2s; }
    .bg-lines .bg-line-3 { width:60%; }
    .bg-lines .bg-line-3:before { animation-delay:4s; }
    .bg-lines .bg-line-4 { width:80%; }
    .bg-lines .bg-line-4:before { animation-delay:6s; }
    @keyframes bgLine { 0% { top:-80px; } to { top:100%; } }

    /* Menu Dots */
    .menu-dots { background:#000; border-bottom-left-radius:.5em; border-bottom-right-radius:.5em; display:inline-block; height:50px; margin-left:24px; position:relative; width:50px; z-index:994; border:none; cursor:pointer; }
    .menu-dots span { display:inline-block; left:50%; top:50%; transform:translate(-50%,-50%) scale(1); }
    .menu-dots span, .menu-dots span:before { background:#fff; border-radius:50%; height:4px; position:absolute; transition:.1s linear; width:4px; }
    .menu-dots span:before { content:""; right:calc(100% + 5px); top:0; }
    .menu-dots span:after { background:#fff; border-radius:50%; content:""; height:4px; left:calc(100% + 5px); position:absolute; top:0; transition:.1s linear; width:4px; }
    .menu-dots:hover span { transform:translate(-50%,-50%) scale(3); }
    .menu-dots:hover span:before { opacity:0; right:0; }
    .menu-dots:hover span:after { left:0; opacity:0; }

    /* Navigation Menu */
    .nav-wrapper { position:-webkit-sticky; position:sticky; top:24px; }
    .section-nav { background:#000; border-radius:.5em; padding:1.7em 2.5em; }
    .section-nav ul li { position:relative; width:100%; }
    .section-nav ul li a { color:#ffffffb3; display:block; font-family:Roboto Mono,monospace; font-size:.9rem; font-weight:400; position:relative; text-transform:uppercase; transition:.1s linear; letter-spacing:.5px; padding:.8rem 0; text-align:left; width:100%; }
    .section-nav ul li a.active, .section-nav ul li a:hover { color:#fff; }
    .section-nav ul li a.active { letter-spacing:1px; }
    .section-nav ul li .nav-link-mobile { display:none; }
    .section-nav ul li .nav-circle { display:inline-block; position:absolute; right:0; top:50%; transform:translateY(-50%); }
    .section-nav ul li .nav-circle:before { background:#fff; border:1px dashed #fff; border-radius:50%; content:""; height:5px; left:50%; opacity:0; position:absolute; top:50%; transform:translate(-50%,-50%); transition:.2s ease-out; width:5px; }
    .section-nav ul li a.active .nav-circle:before, .section-nav ul li a:hover .nav-circle:before { opacity:1; }
    .section-nav ul li a.active .nav-circle:before { animation:translateRotate 10s linear infinite; background:transparent; height:30px; width:30px; }
    @keyframes translateRotate { 0% { transform:translate(-50%,-50%) rotate(0); } to { transform:translate(-50%,-50%) rotate(1turn); } }

    /* Hero Avatar */
    .hero-avatar { position:relative; }
    .hero-avatar img { border-radius:50%; height:auto; max-height:256px; max-width:256px; width:100%; }
    .hero-avatar .hero-avatar-text { backdrop-filter:blur(5px); background:#0000004d; border-radius:2em; bottom:1em; box-shadow:0 8px 26px #16181a1c; color:#fff; font-family:Roboto Mono,monospace; font-size:.9em; font-weight:400; left:.5em; letter-spacing:.5px; padding:.5em 1em; position:absolute; text-transform:uppercase; }

    /* Typing Cursor Animation */
    .typed-cursor {
      opacity: 1;
      animation: typedjsBlink 0.7s infinite;
    }
    @keyframes typedjsBlink {
      50% { opacity: 0.0; }
    }

    /* Title Heading with Backdrop */
    .title-heading { font-family:Roboto Mono,monospace; font-size:.9em; font-weight:500; letter-spacing:.5px; padding-top:16px; position:relative; text-transform:uppercase; }
    .title-heading:before { content:"//"; padding-right:8px; }
    .title-heading:after { bottom:0; color:#000; content:attr(data-backdrop-text); font-family:Poppins,sans-serif; font-size:2.5rem; font-weight:700; left:0; line-height:.9; opacity:.15; position:absolute; text-transform:uppercase; -webkit-text-fill-color:transparent; -webkit-text-stroke-width:1px; -webkit-text-stroke-color:#000; }
    @media (max-width:1199.98px) { .title-heading { padding-top:14px; } }
    @media (max-width:991.98px) { .title-heading:after { font-size:2rem; } }

    /* Skills List */
    .list-inline-pills { display:flex; flex-wrap:wrap; margin:0; }
    .list-inline-pills li { align-items:center; border:1px dashed rgba(0,0,0,.2); border-radius:2em; display:inline-flex; margin:0 7px 10px 0; padding:.5em 1em; transition:.1s linear; }
    .list-inline-pills li svg { height:20px; }
    .list-inline-pills li:hover { color:#000; }

    /* Portfolio Items */
    .filter ul li { border:1px dashed #000; border-radius:2em; color:#000; cursor:pointer; display:inline-block; font-family:Roboto Mono,monospace; font-size:.9em; margin:0 7px 10px 0; padding:.5em 1em; position:relative; transition:.1s linear; text-transform:capitalize; }
    .filter ul li.mixitup-control-active, .filter ul li:hover { background:#000; color:#fff; }
    .portfolio-box { border-radius:.5em; overflow:hidden; position:relative; transform:translateZ(0); }
    .portfolio-box:after { background-image:linear-gradient(0deg,rgba(0,0,0,.3),transparent); content:""; height:100%; left:0; opacity:0; position:absolute; top:0; transition:.16s ease-out; width:100%; }
    .portfolio-box img { transform:scale(1); transition:transform .4s cubic-bezier(.165,.84,.44,1); width:100%; }
    .portfolio-box .contain-categories { position:absolute; right:16px; top:16px; z-index:99; }
    .portfolio-box .contain-categories .portfolio-category { backdrop-filter:blur(5px); background:#0003; border-radius:2em; color:#fff; display:inline-block; font-family:Roboto Mono,monospace; font-size:.9em; font-weight:400; letter-spacing:.5px; padding:.5em 1em; text-transform:uppercase; }
    .portfolio-box .portfolio-caption { bottom:0; left:0; margin-bottom:-6px; opacity:0; padding:0 30px 24px; position:absolute; right:0; transition:.16s ease-out; visibility:hidden; z-index:1; }
    .portfolio-box .portfolio-caption h1 { color:#fff; font-size:1.5rem; font-weight:600; letter-spacing:.5px; margin:0; -webkit-text-fill-color:transparent; -webkit-text-stroke-width:1px; -webkit-text-stroke-color:#fff; transition:.06s linear; }
    .portfolio-box .portfolio-caption h1 a { color:inherit; }
    .portfolio-box:hover:after { opacity:1; }
    .portfolio-box:hover img { filter:blur(1.5px); transform:scale(1.04); }
    .portfolio-box:hover .portfolio-caption { margin-bottom:0; opacity:1; visibility:visible; }

    /* Services List */
    .services-list .services-item { border-top:1px dashed rgba(0,0,0,.2); list-style-type:none; align-items:center; display:flex; padding:30px 0; }
    .services-list .services-item:first-child { border-top:0; padding-top:0; }
    .services-list .services-item:last-child { padding-bottom:0; }
    .services-list .services-item .services-number { min-width:90px; }
    .services-list .services-item .services-title { min-width:270px; padding-right:36px; display:flex; align-items:center; gap:15px; }
    .services-list .services-item .services-title i { font-size:2rem; color:#000; }
    @media (max-width:1199.98px) { .services-list .services-item { padding:20px 0; flex-direction:column; align-items:flex-start; } .services-list .services-item .services-number { margin-bottom:6px; } }

    /* Testimonial Box */
    .testimonial-box { padding-left:16px; padding-top:16px; position:relative; }
    .testimonial-box svg.icon { left:0; opacity:.1; position:absolute; top:0; width:3.3em; z-index:-1; }
    .img-mask-avatar-sm { height:70px; min-width:70px; width:70px; border-radius: 50%; object-fit: cover; }

    /* Resume Section */
    .resume-wrapper { padding-left:20px; position:relative; }
    .resume-wrapper:before { border-left:1px dashed rgba(0,0,0,.2); content:""; height:100%; left:0; position:absolute; top:0; }
    .resume-wrapper i { color:#000; }
    .resume-wrapper .resume-box { margin-bottom:30px; }
    .resume-wrapper .resume-box:last-child { margin-bottom:0; }
    .resume-wrapper .resume-box .resume-date { border:1px dashed rgba(0,0,0,.2); border-radius:2em; display:inline-block; font-family:Roboto Mono,monospace; font-size:.9em; font-weight:500; letter-spacing:.5px; margin-bottom:1em; padding:.5em 1em; position:relative; text-transform:uppercase; transition:.1s linear; }
    .resume-wrapper .resume-box .resume-date:before { border-top:1px dashed rgba(0,0,0,.2); content:""; height:1px; left:-20px; position:absolute; top:50%; transform:translateY(-50%); width:20px; }
    .resume-wrapper .resume-box .resume-date:after { background:#000; border-radius:50%; content:""; height:5px; left:-23px; position:absolute; top:50%; transform:translateY(-50%); width:5px; }
    .resume-wrapper .resume-box:hover .resume-date { color:#000; }
    .icon-2xl i { font-size: 1.86em; }

    /* Blog Section */
    .blog-post-box { align-items:center; display:inline-flex; margin-bottom:24px; width: 100%; }
    .blog-post-box:last-child { margin-bottom:0; }
    .blog-post-box .blog-post-img { border-radius:.5em; overflow:hidden; position:relative; transform:translateZ(0); display:inline-block; flex-shrink: 0; }
    .blog-post-box .blog-post-img img { transform:scale(1); transition:transform .4s cubic-bezier(.165,.84,.44,1); width:340px; height: 100%; object-fit: cover; }
    .blog-post-box .blog-post-img .blog-post-category { backdrop-filter:blur(5px); background:#0003; border-radius:2em; color:#fff; font-family:Roboto Mono,monospace; font-size:.9em; font-weight:400; left:16px; letter-spacing:.5px; padding:.5em 1em; position:absolute; text-transform:uppercase; top:16px; }
    .blog-post-box .blog-post-img .blog-post-category a { color:#fff; text-decoration: none; }
    .blog-post-box .blog-post-img:hover img { filter:blur(1.5px); transform:scale(1.04); }
    .blog-post-box .blog-post-caption { display:inline-block; padding-left:30px; }
    .link-decoration { color:#000000e6; }
    .link-decoration:focus, .link-decoration:hover { color:#000; text-decoration:underline; }
    @media (max-width:1199.98px) {
      .blog-post-box { margin-bottom:40px; display: block; }
      .blog-post-box .blog-post-img img { width:100%; }
      .blog-post-box .blog-post-caption { padding-top:20px; padding-left:0; }
    }
    @media (max-width:991.98px) { .blog-post-box { margin-bottom:30px; } }

    /* Buttons */
    .button { background:#000; border-radius:2em; color:#fff; display:inline-block; font-family:Roboto Mono,monospace; font-size:.9em; overflow:hidden; padding:14px 32px; position:relative; transition:.12s ease-out; border:none; text-decoration: none; }
    .button:hover { background:#000000e6; color:#fff; }
    .button.button-outline { background:transparent; border:1px dashed #000; color:#000; }
    .button.button-outline:hover { background:#000; color:#fff; }
    .button-sm { padding:10px 22px; }
    .button-md { padding:14px 32px; }

    /* Inputs & Forms */
    input:not(.form-check-input), textarea { background:transparent; border:none; border-bottom:1px dashed rgba(0,0,0,.2); box-shadow:none; font:400 14px Open Sans,sans-serif; margin-bottom:2rem; padding:0 0 1rem; transition:.16s ease-out; width:100%; color:#000; outline: none; }
    input:not(.form-check-input):active, input:not(.form-check-input):focus, textarea:active, textarea:focus { border-color:#000; }
    textarea { height:140px; resize: none; }

    /* Map */
    .gmap { width:100%; }
    .gmap-sm { height:350px; }
    @media (max-width:991.98px) { .gmap-sm { height:300px; } }
    .border-radius { border-radius:.5em; overflow:hidden; }
    .box-shadow { box-shadow:0 8px 26px #16181a1c; transition:.16s ease-out; }
    .box-shadow:hover { box-shadow:0 8px 32px #16181a26; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline Icon Components ---
    const Html5Icon = () => (
      <svg className="svg-inline--fa fa-html5 pe-2" aria-hidden="true" focusable="false" data-prefix="fab" data-icon="html5" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="currentColor" d="M0 32l34.9 395.8L191.5 480l157.6-52.2L384 32H0zm308.2 127.9H124.4l4.1 49.4h175.6l-13.6 148.4-97.9 27v.3h-1.1l-98.7-27.3-6-75.8h47.7L138 320l53.5 14.5 53.7-14.5 6-62.2H84.3L71.5 112.2h241.1l-4.4 47.7z"></path></svg>
    );
    const BootstrapIcon = () => (
      <svg className="svg-inline--fa fa-bootstrap pe-2" aria-hidden="true" focusable="false" data-prefix="fab" data-icon="bootstrap" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path fill="currentColor" d="M333.5 201.4c0-22.1-15.6-34.3-43-34.3h-50.4v71.2h42.5c17.2 0 35.3-13.2 35.3-36.9zM517 188.6c-9.5-30.9-10.9-68.8-9.8-98.1c1.1-30.5-22.7-58.5-54.7-58.5H123.7c-32.1 0-55.8 28.1-54.7 58.5c1 29.3-0.3 67.2-9.8 98.1c-9.6 31-25.7 50.6-52.1 53.1v28.5c26.2 2.5 42.4-17.1 51.9-48.1zM300.2 375.1h-97.9V136.8h97.4c43.3 0 71.7 23.4 71.7 59.4c0 25.3-19.1 47.9-43.5 51.8v1.3c33.2 3.6 55.5 26.6 55.5 58.3c0 40.5-31.3 65.9-83.2 65.9zM290.2 266.4h-50.1v78.4h52.3c34.2 0 52.3-13.7 52.3-39.5c0-25.1-18.6-38.3-54.5-38.3z"></path></svg>
    );
    const SearchIcon = () => (
      <svg className="svg-inline--fa fa-magnifying-glass pe-2" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="magnifying-glass" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"></path></svg>
    );
    const QuoteRightIcon = () => (
      <svg className="svg-inline--fa fa-quote-right pe-2 icon" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="quote-right" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M448 296c0 66.3-53.7 120-120 120l-8 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l8 0c30.9 0 56-25.1 56-56l0-8-64 0c-35.3 0-64-28.7-64-64l0-64c0-35.3 28.7-64 64-64l64 0c35.3 0 64 28.7 64 64l0 32 0 32 0 72zm-256 0c0 66.3-53.7 120-120 120l-8 0c-17.7 0-32-14.3-32-32s14.3-32 32-32l8 0c30.9 0 56-25.1 56-56l0-8-64 0c-35.3 0-64-28.7-64-64l0-64c0-35.3 28.7-64 64-64l64 0c35.3 0 64 28.7 64 64l0 32 0 32 0 72z"></path></svg>
    );

    // --- Main Application ---
    function Portfolio() {
      const [activeSection, setActiveSection] = useState('about');
      
      // Typing effect state
      const [text, setText] = useState('');
      const [isDeleting, setIsDeleting] = useState(false);
      const [loopNum, setLoopNum] = useState(0);
      const [typingSpeed, setTypingSpeed] = useState(150);
      
      const phrases = ["I'M CHRISTINA", "HI THERE!"];

      // Typing animation effect
      useEffect(() => {
        let timer = setTimeout(() => {
          const i = loopNum % phrases.length;
          const fullText = phrases[i];

          if (isDeleting) {
            setText(fullText.substring(0, text.length - 1));
            setTypingSpeed(50);
          } else {
            setText(fullText.substring(0, text.length + 1));
            setTypingSpeed(150);
          }

          if (!isDeleting && text === fullText) {
            setTypingSpeed(1500); // Pause before deleting
            setIsDeleting(true);
          } else if (isDeleting && text === '') {
            setIsDeleting(false);
            setLoopNum(loopNum + 1);
            setTypingSpeed(500); // Pause before typing next
          }
        }, typingSpeed);

        return () => clearTimeout(timer);
      }, [text, isDeleting, loopNum, typingSpeed]);

      const navLinks = [
        { id: 'about', label: 'About Me', mobile: 'A' },
        { id: 'portfolio', label: 'Portfolio', mobile: 'P' },
        { id: 'services', label: 'Services', mobile: 'S' },
        { id: 'testimonial', label: 'Testimonial', mobile: 'T' },
        { id: 'resume', label: 'Resume', mobile: 'R' },
        { id: 'blog', label: 'Blog', mobile: 'B' },
        { id: 'contact', label: 'Contact', mobile: 'C' }
      ];

      return (
        <div className="container">
          
          {/* Faint Background Grid Lines */}
          <div className="bg-lines">
             <div className="bg-line-1"></div>
             <div className="bg-line-2"></div>
             <div className="bg-line-3"></div>
             <div className="bg-line-4"></div>
          </div>

          {/* Top Header - Using pure Bootstrap classes */}
          <div id="header">
            <div className="row">
              <div className="col-lg-4 col-xl-3 col-12 order-lg-2 text-end">
                <div className="d-inline-flex align-items-center">
                  <ul className="list-inline d-inline-block mono-heading fw-medium m-0">
                    <li className="list-inline-item"><a className="link-decoration" href="#">FB</a></li>
                    <li className="list-inline-item"><a className="link-decoration" href="#">TW</a></li>
                    <li className="list-inline-item"><a className="link-decoration" href="#">IG</a></li>
                    <li className="list-inline-item"><a className="link-decoration" href="#">In</a></li>
                  </ul>
                  <button className="menu-dots" aria-label="Open toggle menu"><span></span></button>
                </div>
              </div>
              <div className="col-lg-8 col-xl-9 col-12 order-lg-1">
                <div className="py-4">
                  <h1 className="display-2 fw-semi-bold m-0">Christina <span className="stroke-text">Cory</span></h1>
                </div>
              </div>
            </div>
          </div>

          {/* Main Layout */}
          <div className="row g-4 g-lg-5">

            {/* --- Sidebar Navigation --- */}
            <div className="col-lg-4 col-xl-3 col-12">
              <div className="nav-wrapper">
                <div className="section-nav">
                  <ul className="nav flex-column">
                    {navLinks.map((link) => (
                      <li className="nav-item" key={link.id}>
                        <a 
                          className={`nav-link ${activeSection === link.id ? 'active' : ''}`} 
                          href={`#${link.id}`}
                          onClick={(e) => { 
                            e.preventDefault(); 
                            setActiveSection(link.id); 
                            document.getElementById(link.id)?.scrollIntoView({ behavior: 'smooth' });
                          }}
                        >
                          <span className="nav-link-desktop">{link.label}</span>
