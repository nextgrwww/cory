<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christina Gray - Portfolio</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom utility for the outlined text effect */
    .text-outline {
      -webkit-text-stroke: 1.5px #000;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .text-outline-thin {
      -webkit-text-stroke: 1px #000;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Inline Icon Components (Replacing lucide-react for standalone usage) ---
    const IconBase = ({ size = 24, className = '', fill = 'none', children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Menu = (props) => <IconBase {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
    const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
    const ChevronRight = (props) => <IconBase {...props}><path d="m9 18 6-6-6-6"/></IconBase>;
    const ChevronLeft = (props) => <IconBase {...props}><path d="m15 18-6-6 6-6"/></IconBase>;
    const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const Layout = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></IconBase>;
    const Camera = (props) => <IconBase {...props}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>;
    const Monitor = (props) => <IconBase {...props}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></IconBase>;
    const Smartphone = (props) => <IconBase {...props}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></IconBase>;
    const MapPin = (props) => <IconBase {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
    const Mail = (props) => <IconBase {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconBase>;
    const Phone = (props) => <IconBase {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>;
    const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
    const Html5 = (props) => <IconBase {...props}><path d="M4 2l1.6 17.6L12 22l6.4-2.4L20 2H4zm13 5H8.6l.3 3h7.6l-.6 6.3-3.9 1.1-3.9-1.1-.3-3H5.2l.6 6.5L12 18.5l6.2-1.7.9-9.8H7.9l-.3-3h10l.4-4z" fill="currentColor" stroke="none"/></IconBase>;

    // --- Reusable Components ---
    const Card = ({ children, className = '', id }) => (
      <div id={id} className={`bg-white rounded-[1rem] p-8 md:p-12 shadow-[0_8px_30px_rgba(0,0,0,0.04)] relative z-10 ${className}`}>
        {children}
      </div>
    );

    const SectionHeader = ({ subtitle, title }) => (
      <div className="mb-10">
        <span className="text-sm font-bold font-mono tracking-widest text-black uppercase">{subtitle}</span>
        <h2 className="text-3xl md:text-4xl font-extrabold text-gray-900 mt-4 tracking-tight">{title}</h2>
      </div>
    );

    // --- Main Application ---
    function Portfolio() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      // Navigation Links updated to match the screenshot
      const navLinks = [
        { name: 'ABOUT ME', active: true },
        { name: 'PORTFOLIO' },
        { name: 'SERVICES' },
        { name: 'TESTIMONIAL' },
        { name: 'RESUME' },
        { name: 'BLOG' },
        { name: 'CONTACT' }
      ];

      return (
        <div className="min-h-screen bg-[#f4f7fa] font-sans text-gray-600 relative overflow-hidden">
          
          {/* Faint Background Grid Lines */}
          <div className="absolute inset-0 z-0 flex justify-center pointer-events-none opacity-50">
             <div className="w-full max-w-[1200px] flex justify-between px-4 md:px-8">
               <div className="w-px h-full bg-gray-200"></div>
               <div className="w-px h-full bg-gray-200"></div>
               <div className="w-px h-full bg-gray-200"></div>
               <div className="w-px h-full bg-gray-200"></div>
               <div className="w-px h-full bg-gray-200"></div>
             </div>
          </div>

          {/* Top Header - Mobile & Desktop */}
          <header className="relative z-40 w-full max-w-[1200px] mx-auto px-4 md:px-8 pt-10 pb-6 flex justify-between items-center lg:items-end">
            {/* Logo area */}
            <h1 className="text-5xl md:text-7xl lg:text-[80px] font-bold text-black tracking-tighter leading-none flex items-center gap-3">
              Christina
              <span className="text-outline font-medium hidden sm:inline-block">Gray</span>
            </h1>
            
            {/* Mobile Menu Button */}
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-gray-900 lg:hidden">
              {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
            </button>

            {/* Desktop Social Links */}
            <div className="hidden lg:flex items-center gap-6 mb-2">
              <nav className="flex items-center gap-6 font-mono text-sm font-bold text-black tracking-wider">
                <a href="#" className="hover:text-gray-500 transition-colors">FB</a>
                <a href="#" className="hover:text-gray-500 transition-colors">TW</a>
                <a href="#" className="hover:text-gray-500 transition-colors">IG</a>
                <a href="#" className="hover:text-gray-500 transition-colors">IN</a>
              </nav>
              <button className="bg-black text-white p-3 rounded-md hover:bg-gray-800 transition-colors ml-2">
                 <div className="flex gap-[3px]">
                   <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                   <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                   <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                 </div>
              </button>
            </div>
          </header>

          {/* Main Layout Container */}
          <div className="max-w-[1200px] mx-auto flex flex-col lg:flex-row gap-8 px-4 md:px-8 pb-20 relative z-10">

            {/* --- Sidebar Navigation (Desktop) --- */}
            <aside className="hidden lg:block w-[240px] shrink-0">
              <div className="sticky top-8 bg-[#0a0a0a] rounded-xl p-8 py-12 flex flex-col shadow-2xl min-h-[500px]">
                <nav className="flex flex-col gap-8">
                  {navLinks.map((link) => (
                    <div key={link.name} className="flex items-center justify-between group">
                      <a 
                        href={`#${link.name.toLowerCase().replace(' ', '-')}`}
                        className={`text-xs font-mono tracking-[0.15em] transition-colors ${
                          link.active ? 'text-white' : 'text-gray-500 hover:text-white'
                        }`}
                      >
                        {link.name}
                      </a>
                      {link.active && (
                        <div className="w-6 h-6 rounded-full border-[1.5px] border-dashed border-gray-600 flex-shrink-0"></div>
                      )}
                    </div>
                  ))}
                </nav>
              </div>
            </aside>

            {/* --- Mobile Menu Overlay --- */}
            {isMobileMenuOpen && (
              <div className="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center lg:hidden">
                <button 
                  onClick={() => setIsMobileMenuOpen(false)} 
                  className="absolute top-8 right-8 text-white"
                >
                  <X size={32} />
                </button>
                <nav className="flex flex-col gap-8 text-center">
                  {navLinks.map((link) => (
                    <a 
                      key={link.name} 
                      href={`#${link.name.toLowerCase().replace(' ', '-')}`}
                      onClick={() => setIsMobileMenuOpen(false)}
                      className={`text-xl font-mono tracking-[0.2em] transition-colors ${
                        link.active ? 'text-white' : 'text-gray-500'
                      }`}
                    >
                      {link.name}
                    </a>
                  ))}
                </nav>
              </div>
            )}

            {/* --- Main Content Area --- */}
            <main className="w-full flex flex-col gap-10">

              {/* 1. Hero / Intro Section (Matched to Screenshot) */}
              <Card id="about-me" className="flex flex-col pt-12">
                <div className="flex flex-col md:flex-row gap-12 items-center md:items-start mb-16">
                  
                  {/* Image side */}
                  <div className="relative shrink-0 flex justify-center">
                    <div className="w-56 h-56 md:w-64 md:h-64 rounded-full overflow-hidden bg-gray-200 border-8 border-white shadow-sm">
                      <img 
                        src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=400&h=400" 
                        alt="Christina Gray" 
                        className="w-full h-full object-cover"
                      />
                    </div>
                    <div className="absolute -bottom-2 left-0 md:-left-4 bg-gray-400/80 backdrop-blur-md text-white text-xs font-mono font-bold py-2.5 px-5 rounded-full z-10">
                      I'M CHRI_
                    </div>
                  </div>

                  {/* Text side */}
                  <div className="flex-1">
                    <div className="text-xs font-bold font-mono tracking-[0.2em] text-black mb-6">// ABOUT ME</div>
                    
                    <h2 className="text-4xl md:text-5xl font-extrabold text-black leading-tight mb-8">
                      UI & UX Designer.<br/>Photographer
                    </h2>
                    
                    {/* Skills Badges */}
                    <div className="flex flex-wrap gap-4 mb-8">
                      <span className="flex items-center gap-2 border-[1.5px] border-dashed border-gray-300 rounded-full px-4 py-2 text-sm font-medium text-gray-500 bg-white">
                        <div className="w-5 h-5 flex items-center justify-center text-gray-700 bg-gray-100 rounded">
                          <Html5 size={14} />
                        </div>
                        HTML5 & CSS3 (94%)
                      </span>
                      <span className="flex items-center gap-2 border-[1.5px] border-dashed border-gray-300 rounded-full px-4 py-2 text-sm font-medium text-gray-500 bg-white">
                        <div className="w-5 h-5 flex items-center justify-center bg-gray-500 text-white rounded text-[10px] font-bold">
                          B
                        </div>
                        Bootstrap (98%)
                      </span>
                      <span className="flex items-center gap-2 border-[1.5px] border-dashed border-gray-300 rounded-full px-4 py-2 text-sm font-medium text-gray-500 bg-white">
                        <div className="w-5 h-5 flex items-center justify-center text-gray-500">
                          <Search size={16} />
                        </div>
                        SEO (75%)
                      </span>
                    </div>

                    <p className="text-gray-500 leading-relaxed text-base max-w-xl">
                      Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua
                    </p>
                  </div>
                </div>

                {/* Stats */}
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 pt-8">
                  <div className="flex items-center gap-3">
                    <div className="text-[64px] font-bold leading-none text-outline-thin">12</div>
                    <div>
                      <div className="text-2xl font-bold text-black leading-none">+</div>
                      <div className="text-[10px] font-mono font-bold tracking-widest text-black mt-2 uppercase">Years of Experience</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="text-[64px] font-bold leading-none text-outline-thin">20</div>
                    <div>
                      <div className="text-2xl font-bold text-black leading-none">k</div>
                      <div className="text-[10px] font-mono font-bold tracking-widest text-black mt-2 uppercase">Hours of Working</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="text-[64px] font-bold leading-none text-outline-thin">90</div>
                    <div>
                      <div className="text-2xl font-bold text-black leading-none">+</div>
                      <div className="text-[10px] font-mono font-bold tracking-widest text-black mt-2 uppercase">Projects Done</div>
                    </div>
                  </div>
                </div>
              </Card>

              {/* 2. Portfolio Section (Rest of the original layout continues below...) */}
              <Card id="portfolio">
                <SectionHeader subtitle="// PORTFOLIO" title="My Latest Works" />
                
                {/* Filter Tabs */}
                <div className="flex gap-4 mb-8">
                  <span className="px-5 py-2 bg-black text-white text-sm font-semibold rounded-full cursor-pointer">All</span>
                  <span className="px-5 py-2 text-gray-500 hover:text-black text-sm font-semibold cursor-pointer transition-colors">Branding</span>
                  <span className="px-5 py-2 text-gray-500 hover:text-black text-sm font-semibold cursor-pointer transition-colors">Photography</span>
                </div>

                {/* Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  {[
                    { img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=600', badge: 'Mockup', title: 'Pink Glasses' },
                    { img: 'https://images.unsplash.com/photo-1508610048659-a06b669e3321?auto=format&fit=crop&q=80&w=600', badge: 'Product', title: 'White Flower' },
                    { img: 'https://images.unsplash.com/photo-1490750967868-88cb4ec0f8bf?auto=format&fit=crop&q=80&w=600', badge: 'Brand', title: 'Orange Bloom' },
                    { img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=600', badge: 'Design', title: 'House Model' },
                  ].map((item, i) => (
                    <div key={i} className="group relative rounded-2xl overflow-hidden cursor-pointer">
                      <img src={item.img} alt={item.title} className="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-105" />
                      <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-semibold text-gray-900">
                        {item.badge}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* 3. Services Section */}
              <Card id="services">
                <SectionHeader subtitle="// SERVICES" title="What I Do" />
                <div className="flex flex-col gap-10">
                  {[
                    { num: '01', title: 'UI/UX Design', desc: 'Create beautiful and functional user interfaces for web and mobile apps.', icon: <Layout className="w-8 h-8 text-black" /> },
                    { num: '02', title: 'Photography', desc: 'Professional photography services including product, portrait, and event.', icon: <Camera className="w-8 h-8 text-black" /> },
                    { num: '03', title: 'Web Development', desc: 'Front-end development using modern frameworks like React and Vue.', icon: <Monitor className="w-8 h-8 text-black" /> },
                    { num: '04', title: 'App Development', desc: 'Cross-platform mobile application development for iOS and Android.', icon: <Smartphone className="w-8 h-8 text-black" /> },
                  ].map((service, i) => (
                    <div key={i} className="flex items-start gap-6 group cursor-pointer">
                      <div className="relative shrink-0 w-16 h-16 flex items-center justify-center bg-gray-50 rounded-2xl group-hover:bg-black transition-colors duration-300">
                        <span className="absolute -left-4 -top-2 text-4xl font-extrabold text-gray-100 opacity-50 z-0 select-none">
                          {service.num}
                        </span>
                        <div className="z-10 text-gray-900 group-hover:text-white transition-colors duration-300">
                          {React.cloneElement(service.icon, { className: 'w-7 h-7' })}
                        </div>
                      </div>
                      <div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">{service.title}</h3>
                        <p className="text-gray-500 text-sm leading-relaxed">{service.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Portfolio />);
  </script>
</body>
</html>
